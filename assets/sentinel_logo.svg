<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="100%">
  <defs>
    <!-- Vibrant Glowing Brand Gradients -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2" />     <!-- Cyan 600 -->
      <stop offset="45%" stop-color="#4f46e5" />    <!-- Indigo 600 -->
      <stop offset="100%" stop-color="#7c3aed" />   <!-- Violet 600 -->
    </linearGradient>

    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.9" />
    </linearGradient>

    <!-- Subtitle text color (Slate 500/600 compatibility) -->
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>

    <!-- Glow filters for vector elements -->
    <filter id="vectorGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Transparent Background (No background rect/fill) -->

  <g transform="translate(45, 0)">
    <!-- THE ICON: Abstract Geometric Shield & Portal -->
    <g transform="translate(50, 40)">
      <!-- Outer Hexagonal Tech Ring -->
      <path d="M 60,5 L 115,35 L 115,95 L 60,125 L 5,95 L 5,35 Z" 
            fill="none" 
            stroke="#cbd5e1" 
            stroke-width="1" 
            stroke-dasharray="4 4" 
            opacity="0.4" />

      <!-- Outer Shield Shell -->
      <path d="M 60,10 
               C 85,10 110,22 110,25 
               C 110,65 98,102 60,128 
               C 22,102 10,65 10,25 
               C 10,22 35,10 60,10 Z" 
            fill="none" 
            stroke="url(#brandGrad)" 
            stroke-width="3" />

      <!-- Inner Glowing Core Shield (Symmetric Vector Lines) -->
      <path d="M 60,20 
               C 78,20 96,29 96,32 
               C 96,65 86,95 60,116 
               C 34,95 24,65 24,32 
               C 24,29 42,20 60,20 Z" 
            fill="none" 
            stroke="url(#glowGrad)" 
            stroke-width="1.5" 
            opacity="0.8" 
            filter="url(#vectorGlow)" />

      <!-- Refined Abstract 'S' - Smooth Geometric Infinity Ribbon -->
      <path d="M 60,34 
               C 42,34 38,44 38,54 
               C 38,71 60,73 60,86 
               C 60,96 52,102 42,102 
               C 36,102 34,98 34,98
               M 60,102 
               C 78,102 82,92 82,82 
               C 82,65 60,63 60,50 
               C 60,40 68,34 78,34 
               C 84,34 86,38 86,38" 
            fill="none" 
            stroke="url(#brandGrad)" 
            stroke-width="9.5" 
            stroke-linecap="round" 
            stroke-linejoin="round" />

      <!-- Precision tech dots -->
      <circle cx="60" cy="20" r="3.5" fill="#22d3ee" />
      <circle cx="60" cy="116" r="3.5" fill="#a78bfa" />
    </g>

    <!-- TYPOGRAPHY -->
    <!-- Primary Title: "Sentinel" using Gradient -->
    <text x="215" y="118" 
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-size="76" 
          font-weight="900" 
          letter-spacing="-1.5px" 
          fill="url(#brandGrad)">
      Sentinel
    </text>

    <!-- Tech Badge Pill: "GATEWAY" -->
    <g transform="translate(565, 68)">
      <rect width="105" height="24" rx="12" fill="none" stroke="url(#brandGrad)" stroke-width="1.5" />
      <text x="52.5" y="15" 
            font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
            font-size="10" 
            font-weight="800" 
            letter-spacing="1.2px" 
            fill="url(#brandGrad)" 
            text-anchor="middle">
        GATEWAY
      </text>
    </g>

    <!-- Subtitle 1: "ENTERPRISE COST INTELLIGENCE" -->
    <text x="218" y="156" 
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-size="16" 
          font-weight="800" 
          letter-spacing="3.5px" 
          fill="url(#brandGrad)" 
          opacity="0.95">
      ENTERPRISE COST INTELLIGENCE
    </text>

    <!-- Subtitle 2: Capabilities descriptor -->
    <text x="218" y="180" 
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-size="13.5" 
          font-weight="500" 
          letter-spacing="0.5px" 
          fill="url(#subGrad)">
      Real-time LLM Gateway, Budgets &amp; Predictive Forecasting
    </text>
  </g>
</svg>
