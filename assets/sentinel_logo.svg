<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="100%" height="100%">
  <defs>
    <!-- Primary gradient: deep indigo to electric cyan -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Inner glow gradient -->
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Eye iris gradient -->
    <radialGradient id="irisGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </radialGradient>

    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Outer ambient glow -->
    <filter id="ambientGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ============================================================ -->
  <!-- SHIELD ICON (left side, centered in a ~200x240 area)         -->
  <!-- ============================================================ -->
  <g transform="translate(100, 120) scale(0.32)">
    <!-- Outer shield border -->
    <path d="M 0,-280 
             L 220,-160 
             L 220,80 
             C 220,180 0,280 0,280 
             C 0,280 -220,180 -220,80 
             L -220,-160 
             Z"
          fill="none"
          stroke="url(#primaryGrad)"
          stroke-width="18"
          stroke-linejoin="round"
          filter="url(#ambientGlow)"
          opacity="0.95"/>

    <!-- Inner shield fill (subtle) -->
    <path d="M 0,-256 
             L 198,-146 
             L 198,70 
             C 198,158 0,254 0,254 
             C 0,254 -198,158 -198,70 
             L -198,-146 
             Z"
          fill="url(#primaryGrad)"
          opacity="0.08"/>

    <!-- Eye outer shape (almond) -->
    <path d="M -160,0 
             C -110,-100 -50,-130 0,-130 
             C 50,-130 110,-100 160,0 
             C 110,100 50,130 0,130 
             C -50,130 -110,100 -160,0 Z"
          fill="none"
          stroke="url(#innerGrad)"
          stroke-width="10"
          stroke-linejoin="round"
          filter="url(#glow)"
          opacity="0.9"/>

    <!-- Eye iris -->
    <circle cx="0" cy="0" r="62"
            fill="url(#irisGrad)"
            opacity="0.85"
            filter="url(#glow)"/>

    <!-- Pupil -->
    <circle cx="0" cy="0" r="24"
            fill="#1e1b4b"
            opacity="0.95"/>

    <!-- Pupil highlight -->
    <circle cx="12" cy="-12" r="9"
            fill="#e0e7ff"
            opacity="0.9"/>

    <!-- Circuit lines: left -->
    <line x1="-170" y1="-60" x2="-130" y2="-60" stroke="url(#innerGrad)" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
    <circle cx="-170" cy="-60" r="4" fill="#a78bfa" opacity="0.6"/>

    <!-- Circuit lines: right -->
    <line x1="170" y1="-60" x2="130" y2="-60" stroke="url(#innerGrad)" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
    <circle cx="170" cy="-60" r="4" fill="#22d3ee" opacity="0.6"/>

    <!-- Circuit lines: bottom -->
    <line x1="-35" y1="160" x2="-35" y2="130" stroke="url(#innerGrad)" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
    <line x1="35" y1="160" x2="35" y2="130" stroke="url(#innerGrad)" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
    <circle cx="-35" cy="160" r="3" fill="#a78bfa" opacity="0.5"/>
    <circle cx="35" cy="160" r="3" fill="#22d3ee" opacity="0.5"/>

    <!-- Top node -->
    <line x1="0" y1="-170" x2="0" y2="-200" stroke="url(#innerGrad)" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
    <circle cx="0" cy="-204" r="5" fill="url(#innerGrad)" opacity="0.7"/>
  </g>

  <!-- ============================================================ -->
  <!-- WORDMARK (right side, vertically centered and center-aligned)-->
  <!-- ============================================================ -->
  <!-- "SENTINEL" main text -->
  <text x="420" y="105" 
        text-anchor="middle" 
        dominant-baseline="central"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif" 
        font-size="68" 
        font-weight="800" 
        letter-spacing="10" 
        fill="url(#primaryGrad)">SENTINEL</text>

  <!-- Thin separator line -->
  <line x1="220" y1="132" x2="620" y2="132" 
        stroke="url(#innerGrad)" 
        stroke-width="1" 
        opacity="0.3"/>

  <!-- Tagline -->
  <text x="420" y="155" 
        text-anchor="middle" 
        dominant-baseline="central"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif" 
        font-size="16" 
        font-weight="500" 
        letter-spacing="6" 
        fill="url(#innerGrad)"
        opacity="0.65">COST INTELLIGENCE &amp; LLM GATEWAY</text>
</svg>
