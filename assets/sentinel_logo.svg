<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050811" />
      <stop offset="50%" stop-color="#0a0f1d" />
      <stop offset="100%" stop-color="#050811" />
    </linearGradient>

    <!-- Shield Glow & Colors -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#9333ea" />
    </linearGradient>

    <linearGradient id="shieldAccent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.2" />
    </linearGradient>

    <!-- Text Typography Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="70%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
    
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <!-- Glow Effect Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="glowSubtle" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="800" height="250" rx="20" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="1.5" />

  <!-- Ambient Glow Behind Shield -->
  <circle cx="160" cy="125" r="70" fill="#06b6d4" opacity="0.12" filter="url(#glow)" />
  <circle cx="640" cy="125" r="90" fill="#4f46e5" opacity="0.08" filter="url(#glow)" />

  <!-- Graphic grid details (Subtle futuristic details) -->
  <path d="M 50,0 L 50,250 M 750,0 L 750,250" stroke="#1e293b" stroke-width="0.5" opacity="0.5" />
  <path d="M 0,50 L 800,50 M 0,200 L 800,200" stroke="#1e293b" stroke-width="0.5" opacity="0.5" />

  <!-- The Shield/Sentinel S Icon -->
  <g transform="translate(100, 52)">
    <!-- Outer Glowing Shield Outline -->
    <path d="M 60,0 L 110,20 C 110,60 100,110 60,140 C 20,110 10,60 10,20 Z" 
          fill="none" 
          stroke="url(#shieldGrad)" 
          stroke-width="3" 
          filter="url(#glowSubtle)" />

    <!-- Inner Shield Body -->
    <path d="M 60,6 L 104,24 C 104,60 94,104 60,132 C 26,104 16,60 16,24 Z" 
          fill="url(#shieldAccent)" 
          opacity="0.15" />

    <!-- Stylized Futuristic 'S' inside the Shield -->
    <path d="M 60,30 
             C 45,30 38,38 38,48 
             C 38,62 60,65 60,78 
             C 60,88 50,94 40,94
             M 60,110
             C 75,110 82,102 82,92
             C 82,78 60,75 60,62
             C 60,52 70,46 80,46" 
          fill="none" 
          stroke="url(#shieldGrad)" 
          stroke-width="9" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <!-- Decorative Tech Nodes -->
    <circle cx="60" cy="132" r="3.5" fill="#22d3ee" />
    <circle cx="60" cy="6" r="3.5" fill="#22d3ee" />
  </g>

  <!-- Typography -->
  <!-- Brand Name -->
  <text x="250" y="125" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="64" 
        font-weight="900" 
        letter-spacing="-1px" 
        fill="url(#textGrad)">
    Sentinel
  </text>
  
  <!-- Cost Intelligence pill -->
  <g transform="translate(535, 82)">
    <rect width="135" height="24" rx="12" fill="#1e1b4b" stroke="#312e81" stroke-width="1" />
    <text x="67.5" y="15" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="9" 
          font-weight="800" 
          letter-spacing="0.8px" 
          fill="#818cf8" 
          text-anchor="middle">
      GATEWAY SECURE
    </text>
  </g>

  <!-- Subtitle / Professional Description -->
  <text x="252" y="162" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="15" 
        font-weight="600" 
        letter-spacing="2.5px" 
        fill="url(#brandGrad)">
    ENTERPRISE COST INTELLIGENCE
  </text>
  
  <text x="252" y="185" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="13" 
        font-weight="500" 
        letter-spacing="1px" 
        fill="#64748b">
    Real-time LLM Proxying, Budgets &amp; Forecasting
  </text>

  <!-- Decorative bottom bar with brand color -->
  <rect x="0" y="246" width="800" height="4" fill="url(#shieldGrad)" />
</svg>
