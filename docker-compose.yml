version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/sentinel
      SECRET_KEY: sentinel-docker-dev-secret-key-change-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
    depends_on:
      - postgres
    ports:
      - '8000:8000'

  frontend:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    ports:
      - '5173:5173'

volumes:
  postgres_data:
